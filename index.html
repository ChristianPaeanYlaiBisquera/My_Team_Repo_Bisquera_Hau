<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Boss Rush TD - Hard Economy</title>
    <style>
        /* ========== RESET & GLOBAL ========== */
        * {
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(145deg, #0a1a1f 0%, #0c2a2f 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Courier New', monospace;
            margin: 0;
            padding: 20px;
        }

        /* ========== GAME WRAPPER ========== */
        .game-wrapper {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-start;
        }

        /* ========== CANVAS CONTAINER ========== */
        .game-container {
            background: #1e3a3f;
            border-radius: 48px;
            padding: 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.5), inset 0 1px 2px rgba(255,255,255,0.1);
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            cursor: crosshair;
            background-color: #1d2f2e;
        }

        /* ========== TOWER PANEL (RIGHT SIDEBAR) ========== */
        .tower-panel {
            background: #0e282ecc;
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 16px 12px;
            width: 190px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            border: 1px solid #58c4b4;
        }

        .tower-panel h3 {
            text-align: center;
            margin: 0 0 12px 0;
            color: #f5e2b0;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }

        .tower-option {
            background: #1f4448;
            margin-bottom: 10px;
            padding: 6px 8px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.1s ease;
            border: 2px solid transparent;
        }

        .tower-option.selected {
            border-color: #ffd966;
            background: #2e6b65;
            box-shadow: 0 0 8px #ffd966;
        }

        .tower-option:hover {
            background: #3a7d76;
            transform: scale(0.98);
        }

        .tower-icon {
            font-size: 28px;
            width: 44px;
            text-align: center;
        }

        .tower-stats {
            flex: 1;
            font-size: 10px;
            font-weight: bold;
            color: #eef5db;
        }

        .tower-stats div {
            line-height: 1.25;
        }

        .price {
            color: #ffd966;
        }

        /* ========== INFO PANEL (TOP BAR) ========== */
        .info-panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            margin-bottom: 12px;
            gap: 15px;
            flex-wrap: wrap;
            background: #0e282ecc;
            backdrop-filter: blur(4px);
            padding: 10px 20px;
            border-radius: 60px;
        }

        .stats {
            display: flex;
            gap: 18px;
            background: #071a1e;
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: bold;
        }

        .stat {
            color: #c0f2e6;
            font-size: 0.9rem;
        }

        .stat span {
            color: #f5c542;
            font-size: 1.2rem;
            font-weight: bold;
            margin-left: 5px;
        }

        button {
            background: #2d5e5e;
            border: none;
            color: white;
            font-family: monospace;
            font-weight: bold;
            font-size: 0.9rem;
            padding: 5px 18px;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.1s linear;
            box-shadow: 0 3px 0 #0e2a2a;
        }

        button:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #0e2a2a;
        }

        .wave-progress {
            background: #030f12;
            padding: 4px 14px;
            border-radius: 28px;
            color: #b4e6da;
            font-size: 0.8rem;
            font-weight: bold;
        }

        .message-area {
            background: #030f12;
            padding: 6px 16px;
            border-radius: 28px;
            color: #fad974;
            font-size: 0.8rem;
            font-weight: bold;
            margin-top: 10px;
            text-align: center;
        }

        /* ========== RESPONSIVE ========== */
        @media (max-width: 800px) {
            .tower-panel { width: 160px; }
            .tower-icon { font-size: 24px; width: 36px; }
            .stats { gap: 10px; }
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="game-container">
        <canvas id="gameCanvas" width="900" height="600"></canvas>
        <div class="info-panel">
            <div class="stats">
                <div class="stat">❤️ <span id="livesDisplay">25</span></div>
                <div class="stat">💰 <span id="goldDisplay">100</span></div>
                <div class="stat">🌊 <span id="waveDisplay">0</span>/15</div>
                <div class="stat">⚔️ <span id="killsDisplay">0</span></div>
            </div>
            <button id="startWaveBtn">⚔️ START WAVE</button>
            <button id="resetButton">🔄 RESTART</button>
        </div>
        <div class="wave-progress" id="waveStatus">🔮 Wave 0/15 | +10💰 per kill | Boss at 15!</div>
        <div class="message-area" id="gameMessage">
            🧙 Start with 100💰! Enemies drop 10💰. Build wisely for the final BOSS!
        </div>
    </div>

    <div class="tower-panel">
        <h3>🏛️ TOWER ARSENAL</h3>
        <div id="towerList"></div>
    </div>
</div>

<script>
    (function(){
        // ---------- CANVAS ----------
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // ---------- GAME DIMENSIONS ----------
        const CELL_W = 60;
        const CELL_H = 60;
        const GRID_W = 15;
        const GRID_H = 10;

        // ---------- PATH DEFINITION (classic twist) ----------
        const waypoints = [
            { x: 0, y: 2 },   // start left
            { x: 4, y: 2 },
            { x: 4, y: 6 },
            { x: 10, y: 6 },
            { x: 10, y: 3 },
            { x: 14, y: 3 }    // end right
        ];

        const pathTilesSet = new Set();
        function addLinePathSegment(x0,y0,x1,y1){
            let dx = Math.sign(x1 - x0);
            let dy = Math.sign(y1 - y0);
            let steps = Math.max(Math.abs(x1-x0), Math.abs(y1-y0));
            let curX = x0, curY = y0;
            for(let i=0; i<=steps; i++){
                pathTilesSet.add(`${curX},${curY}`);
                if(curX !== x1) curX += dx;
                if(curY !== y1) curY += dy;
            }
        }
        for(let i=0; i<waypoints.length-1; i++){
            addLinePathSegment(waypoints[i].x, waypoints[i].y, waypoints[i+1].x, waypoints[i+1].y);
        }

        function isPathTile(col, row){
            return pathTilesSet.has(`${col},${row}`);
        }
        function insideGrid(col,row){
            return col>=0 && col<GRID_W && row>=0 && row<GRID_H;
        }

        // ---------- 6 TOWER TYPES (prices adjusted for hard economy) ----------
        const TOWER_TYPES = [
            { id: 0, name: "🏹 RANGER",  price: 50, damage: 24, range: 115, cooldownMax: 24, icon: "🏹", desc: "Solid dps" },
            { id: 1, name: "🔥 PYRO",    price: 75, damage: 48, range: 120, cooldownMax: 36, icon: "🔥", desc: "High burst" },
            { id: 2, name: "❄️ FROST",   price: 65, damage: 20, range: 110, cooldownMax: 28, icon: "❄️", desc: "Slows 25%" },
            { id: 3, name: "⚡ ZAPPER",  price: 85, damage: 32, range: 130, cooldownMax: 30, icon: "⚡", desc: "Chain +5" },
            { id: 4, name: "🌿 DRUID",   price: 60, damage: 18, range: 105, cooldownMax: 20, icon: "🌿", desc: "Rapid attack" },
            { id: 5, name: "💣 CANNON",  price: 110, damage: 72, range: 140, cooldownMax: 54, icon: "💥", desc: "Massive dmg" }
        ];

        let towers = []; 
        let selectedTowerType = 0;

        // ---------- ENEMIES & WAVE SYSTEM (15 waves + final boss) ----------
        let enemies = [];
        let enemyId = 0;
        let currentWave = 0;
        let waveInProgress = false;
        let waveSpawnTimer = 0;
        const BASE_SPAWN_DELAY = 26;
        let enemiesToSpawn = 0;
        let isBossWaveTriggered = false;
        let bossDefeated = false;
        
        // ECONOMY: start 100 gold, enemies drop exactly 10 coins
        let lives = 25;
        let gold = 100;
        let totalKills = 0;
        let gameWinFlag = false;
        let gameOverFlag = false;

        // UI elements
        const livesSpan = document.getElementById('livesDisplay');
        const goldSpan = document.getElementById('goldDisplay');
        const waveSpan = document.getElementById('waveDisplay');
        const killsSpan = document.getElementById('killsDisplay');
        const waveStatusDiv = document.getElementById('waveStatus');
        const messageDiv = document.getElementById('gameMessage');
        const startWaveBtn = document.getElementById('startWaveBtn');
        const resetBtn = document.getElementById('resetButton');

        let animationId = null;

        // Path nodes
        function buildPathNodes(){
            let nodes = [];
            for(let i=0; i<waypoints.length-1; i++){
                let from = waypoints[i];
                let to = waypoints[i+1];
                let fromX = from.x * CELL_W + CELL_W/2;
                let fromY = from.y * CELL_H + CELL_H/2;
                let toX = to.x * CELL_W + CELL_W/2;
                let toY = to.y * CELL_H + CELL_H/2;
                let dx = toX - fromX;
                let dy = toY - fromY;
                let distance = Math.hypot(dx, dy);
                let steps = Math.max(1, Math.ceil(distance / 7));
                for(let s=0; s<=steps; s++){
                    let t = s/steps;
                    nodes.push({x: fromX + dx*t, y: fromY + dy*t});
                }
            }
            return nodes;
        }
        const pathNodes = buildPathNodes();
        const startPoint = pathNodes[0];
        const endPoint = pathNodes[pathNodes.length-1];

        // Enemy Class (with boss variant & fixed 10 gold drop for normal enemies)
        class Enemy {
            constructor(id, wave, isBoss = false) {
                this.id = id;
                this.isBoss = isBoss;
                this.pathIndex = 1;
                this.x = startPoint.x;
                this.y = startPoint.y;
                if(isBoss){
                    this.maxHealth = 1300 + wave * 40;
                    this.health = this.maxHealth;
                    this.bounty = 300;   // Boss gives 300 gold (big reward)
                    this.speed = 1.05;
                    this.size = 28;
                    this.damageToLives = 5;
                } else {
                    let baseHealth = 36;
                    this.maxHealth = Math.floor(baseHealth + wave * 7.5);
                    this.health = this.maxHealth;
                    this.bounty = 10;    // EVERY normal enemy drops exactly 10 gold
                    this.speed = 1.82;
                    this.size = 14;
                    this.damageToLives = 1;
                }
                this.reachedEnd = false;
                this.slowFactor = 1.0;
                this.slowTimer = 0;
            }
            update(){
                if(this.reachedEnd) return;
                if(this.slowTimer > 0){
                    this.slowTimer--;
                    if(this.slowTimer <= 0) this.slowFactor = 1.0;
                }
                let targetNode = pathNodes[this.pathIndex];
                if(!targetNode){ this.reachedEnd = true; return; }
                let dx = targetNode.x - this.x;
                let dy = targetNode.y - this.y;
                let distance = Math.hypot(dx, dy);
                if(distance < 3){
                    this.pathIndex++;
                    if(this.pathIndex >= pathNodes.length) this.reachedEnd = true;
                    return;
                }
                let step = Math.min(this.speed * this.slowFactor, distance);
                let angle = Math.atan2(dy, dx);
                this.x += Math.cos(angle) * step;
                this.y += Math.sin(angle) * step;
            }
            applySlow(percent, duration){
                if(percent < this.slowFactor){
                    this.slowFactor = percent;
                    this.slowTimer = duration;
                }
            }
            draw(ctx){
                let hpPercent = this.health / this.maxHealth;
                if(this.isBoss){
                    ctx.shadowBlur = 12;
                    ctx.shadowColor = "#a00000";
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                    ctx.fillStyle = "#6a1a1a";
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size-4, 0, Math.PI*2);
                    ctx.fillStyle = "#b42f2f";
                    ctx.fill();
                    ctx.fillStyle = "#ffcc88";
                    ctx.font = "bold 18px monospace";
                    ctx.fillText("👑 BOSS", this.x-32, this.y-22);
                    ctx.font = "bold 12px monospace";
                } else {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
                    ctx.fillStyle = "#5a2e2a";
                    ctx.fill();
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size-2, 0, Math.PI*2);
                    ctx.fillStyle = "#dd5f4a";
                    ctx.fill();
                }
                ctx.fillStyle = "#a52a2a";
                ctx.fillRect(this.x-22, this.y-22, 44, 7);
                ctx.fillStyle = "#6eff6e";
                ctx.fillRect(this.x-22, this.y-22, 44 * hpPercent, 6);
                ctx.fillStyle = "white";
                ctx.font = "bold 10px monospace";
                ctx.fillText(`${Math.floor(this.health)}/${this.maxHealth}`, this.x-20, this.y-26);
                if(this.slowFactor < 0.85){
                    ctx.fillStyle = "#aaf0ffaa";
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size+3, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.shadowBlur = 0;
            }
            takeDamage(amount, sourceTypeId){
                this.health -= amount;
                if(sourceTypeId === 2 && !this.isBoss) this.applySlow(0.72, 80);
                if(this.isBoss && sourceTypeId === 2) this.applySlow(0.85, 45);
                if(this.health <= 0) return true;
                return false;
            }
        }

        // Tower building
        function addTower(col, row){
            if(gameOverFlag || gameWinFlag) return false;
            if(!insideGrid(col,row)) return false;
            if(isPathTile(col,row)) return false;
            if(towers.some(t => t.col === col && t.row === row)) return false;
            const towerDef = TOWER_TYPES[selectedTowerType];
            if(gold < towerDef.price){
                showMessage(`💰 Need ${towerDef.price} gold!`, 900);
                return false;
            }
            gold -= towerDef.price;
            towers.push({
                col, row, typeId: selectedTowerType, cooldown: 0,
                cooldownMax: towerDef.cooldownMax,
                damage: towerDef.damage,
                range: towerDef.range
            });
            updateUI();
            showMessage(`✔️ ${towerDef.name} built!`, 800);
            return true;
        }

        function updateTowers(){
            for(let t of towers){
                if(t.cooldown > 0){ t.cooldown--; continue; }
                let towerX = t.col * CELL_W + CELL_W/2;
                let towerY = t.row * CELL_H + CELL_H/2;
                let towerSpec = TOWER_TYPES[t.typeId];
                let closest = null;
                let minDist = t.range+1;
                for(let enemy of enemies){
                    let dist = Math.hypot(enemy.x - towerX, enemy.y - towerY);
                    if(dist < minDist){
                        minDist = dist;
                        closest = enemy;
                    }
                }
                if(closest){
                    t.cooldown = t.cooldownMax;
                    let isDead = closest.takeDamage(t.damage, t.typeId);
                    // Zapper chain (type 3)
                    if(t.typeId === 3 && !isDead){
                        let nearby = enemies.filter(e => e !== closest && Math.hypot(e.x - towerX, e.y - towerY) < t.range);
                        if(nearby.length) nearby[0].takeDamage(6, t.typeId);
                        addShootEffect(towerX, towerY, closest.x, closest.y, "⚡");
                    }
                    if(isDead){
                        const idx = enemies.indexOf(closest);
                        if(idx !== -1){
                            enemies.splice(idx,1);
                            // Apply gold reward (10 for normal, boss has its own bounty)
                            gold += closest.bounty;
                            totalKills++;
                            updateUI();
                            if(closest.isBoss){
                                bossDefeated = true;
                                showMessage(`💀 BOSS SLAIN! +${closest.bounty}💰 VICTORY!`, 2000);
                                gameVictory();
                            } else {
                                showMessage(`+${closest.bounty}💰`, 280);
                            }
                        }
                    }
                    addShootEffect(towerX, towerY, closest.x, closest.y, towerSpec.icon);
                }
            }
        }

        let effects = [];
        function addShootEffect(fromX, fromY, toX, toY, icon){
            effects.push({ fromX, fromY, toX, toY, life: 5, icon: icon || "💢" });
        }

        // Wave management with 15 waves + Boss at wave 15
        function startWave(){
            if(gameOverFlag){
                showMessage("Game over! Press RESTART.", 1000);
                return;
            }
            if(gameWinFlag){
                showMessage("🏆 You already won! Restart to play again.", 1500);
                return;
            }
            if(waveInProgress){
                showMessage("Wave already active!", 700);
                return;
            }
            if(lives <= 0) return;
            if(currentWave >= 15){
                showMessage("All waves finished! Congratulations!", 1200);
                return;
            }
            currentWave++;
            waveSpan.innerText = currentWave;
            waveStatusDiv.innerHTML = `🔥 WAVE ${currentWave}/15 ${currentWave === 15 ? '⭐ BOSS WAVE! ⭐' : '⚔️'}`;
            
            let isBossWave = (currentWave === 15);
            if(isBossWave){
                enemiesToSpawn = 1; 
                isBossWaveTriggered = true;
                waveInProgress = true;
                waveSpawnTimer = 15;
                showMessage(`👾 BOSS ALERT! Defeat the ancient horror (rewards 300💰)! 👾`, 2500);
            } else {
                let count = 4 + Math.floor(currentWave * 1.25);
                if(count > 16) count = 16;
                enemiesToSpawn = count;
                waveInProgress = true;
                waveSpawnTimer = 12;
                showMessage(`⚔️ Wave ${currentWave} - ${count} enemies (10💰 each)!`, 1500);
            }
            updateUI();
        }

        function updateWaveSpawning(){
            if(!waveInProgress) return;
            // boss wave special handling: spawn boss + 2 guards (guards also drop 10)
            if(currentWave === 15 && isBossWaveTriggered){
                if(enemies.length === 0 && enemiesToSpawn === 0){
                    waveInProgress = false;
                    isBossWaveTriggered = false;
                    if(!bossDefeated){
                        // boss might still be alive? but if no enemies and boss not defeated means bug, but skip
                    } else {
                        gameVictory();
                    }
                    return;
                }
                if(enemiesToSpawn > 0){
                    if(waveSpawnTimer <= 0){
                        if(enemiesToSpawn === 1){
                            let bossEnemy = new Enemy(enemyId++, currentWave, true);
                            enemies.push(bossEnemy);
                            enemiesToSpawn--;
                            waveSpawnTimer = 45;
                        } else if(enemiesToSpawn === 2){
                            let minion = new Enemy(enemyId++, currentWave, false);
                            enemies.push(minion);
                            enemiesToSpawn--;
                            waveSpawnTimer = 20;
                        } else if(enemiesToSpawn === 3){
                            let minion2 = new Enemy(enemyId++, currentWave, false);
                            enemies.push(minion2);
                            enemiesToSpawn--;
                            waveSpawnTimer = 20;
                        } else {
                            enemiesToSpawn = 0;
                        }
                    } else {
                        waveSpawnTimer--;
                    }
                }
                return;
            }
            
            // Normal wave logic (enemies drop 10 gold each)
            if(enemiesToSpawn <= 0 && enemies.length === 0){
                waveInProgress = false;
                let bonus = 60 + currentWave * 3; // slight wave completion bonus, but still small
                gold += bonus;
                showMessage(`✅ Wave ${currentWave} cleared! +${bonus} bonus gold!`, 1500);
                updateUI();
                if(currentWave >= 15){
                    gameVictory();
                }
                return;
            }
            if(enemiesToSpawn > 0){
                if(waveSpawnTimer <= 0){
                    let normalEnemy = new Enemy(enemyId++, currentWave, false);
                    enemies.push(normalEnemy);
                    enemiesToSpawn--;
                    waveSpawnTimer = BASE_SPAWN_DELAY;
                } else {
                    waveSpawnTimer--;
                }
            }
        }

        function gameVictory(){
            if(gameWinFlag) return;
            gameWinFlag = true;
            waveInProgress = false;
            gameOverFlag = false;
            showMessage(`🎉✨ VICTORY! You defeated the final boss and all 15 waves! ✨🎉`, 5000);
            waveStatusDiv.innerHTML = "🏆 CHAMPION! GAME COMPLETED 🏆";
            if(animationId) cancelAnimationFrame(animationId);
            animationId = null;
            drawVictoryScreen();
        }

        function checkEnemiesReachedEnd(){
            for(let i=0; i<enemies.length; i++){
                if(enemies[i].reachedEnd){
                    let dmg = enemies[i].isBoss ? 5 : 1;
                    lives -= dmg;
                    enemies.splice(i,1);
                    i--;
                    updateUI();
                    showMessage(`💔 -${dmg} life!`, 600);
                    if(lives <= 0) gameOver();
                }
            }
        }

        function gameOver(){
            if(gameOverFlag) return;
            gameOverFlag = true;
            gameWinFlag = false;
            waveInProgress = false;
            showMessage(`💀 GAME OVER - Reached wave ${currentWave}`, 3000);
            if(animationId) cancelAnimationFrame(animationId);
            animationId = null;
            drawGameOverScreen();
        }

        function resetGame(){
            towers = [];
            enemies = [];
            enemyId = 0;
            currentWave = 0;
            waveInProgress = false;
            enemiesToSpawn = 0;
            lives = 25;
            gold = 100;        // starting coins only 100
            totalKills = 0;
            gameOverFlag = false;
            gameWinFlag = false;
            bossDefeated = false;
            isBossWaveTriggered = false;
            effects = [];
            updateUI();
            waveSpan.innerText = "0";
            waveStatusDiv.innerHTML = "🔮 Wave 0/15 | +10💰 per kill | Boss at 15!";
            showMessage("Game reset! Start with 100💰. Enemies drop 10💰 each. Build carefully!", 1800);
            if(!animationId){
                animationId = requestAnimationFrame(gameLoop);
            }
        }

        function updateUI(){
            livesSpan.innerText = lives;
            goldSpan.innerText = Math.floor(gold);
            waveSpan.innerText = currentWave;
            killsSpan.innerText = totalKills;
        }

        function showMessage(msg, duration=1200){
            messageDiv.innerHTML = `✨ ${msg} ✨`;
            setTimeout(() => {
                if(messageDiv.innerHTML.includes(msg))
                    messageDiv.innerHTML = "🧙 100💰 start | +10💰 per kill | Build towers & survive 15 waves!";
            }, duration);
        }

        // Drawing functions
        function drawGridAndPath(){
            for(let row=0; row<GRID_H; row++){
                for(let col=0; col<GRID_W; col++){
                    let x = col*CELL_W;
                    let y = row*CELL_H;
                    let isPath = isPathTile(col,row);
                    let towerHere = towers.find(t => t.col === col && t.row === row);
                    if(isPath){
                        ctx.fillStyle = "#4b3e2e";
                        ctx.fillRect(x, y, CELL_W-1, CELL_H-1);
                        ctx.fillStyle = "#8b6946";
                        ctx.fillRect(x+3, y+3, CELL_W-7, CELL_H-7);
                        ctx.fillStyle = "#d6ae6a";
                        ctx.fillRect(x+6, y+6, CELL_W-13, CELL_H-13);
                    } else {
                        ctx.fillStyle = "#2f5549";
                        ctx.fillRect(x, y, CELL_W-1, CELL_H-1);
                        ctx.strokeStyle = "#417b6b";
                        ctx.strokeRect(x+1, y+1, CELL_W-3, CELL_H-3);
                    }
                    if(towerHere){
                        let tData = TOWER_TYPES[towerHere.typeId];
                        ctx.fillStyle = "#2f5f5a";
                        ctx.fillRect(x+6, y+6, CELL_W-12, CELL_H-12);
                        ctx.font = `32px monospace`;
                        ctx.fillStyle = "#fbe192";
                        ctx.fillText(tData.icon, x+14, y+48);
                        ctx.globalAlpha = 0.2;
                        ctx.beginPath();
                        ctx.arc(x+CELL_W/2, y+CELL_H/2, towerHere.range, 0, Math.PI*2);
                        ctx.fillStyle = "#b5f0e0";
                        ctx.fill();
                        ctx.globalAlpha = 1;
                    }
                    if(col===waypoints[0].x && row===waypoints[0].y){
                        ctx.fillStyle = "#88ffaa";
                        ctx.font = "bold 20px monospace";
                        ctx.fillText("🚪", x+18, y+45);
                    }
                    if(col===waypoints[waypoints.length-1].x && row===waypoints[waypoints.length-1].y){
                        ctx.fillStyle = "#ff8866";
                        ctx.fillText("🏁", x+18, y+45);
                    }
                }
            }
        }

        function drawEffects(){
            for(let i=0; i<effects.length; i++){
                let ef = effects[i];
                ctx.beginPath();
                ctx.moveTo(ef.fromX, ef.fromY);
                ctx.lineTo(ef.toX, ef.toY);
                ctx.strokeStyle = `rgba(255, 210, 80, ${ef.life/5})`;
                ctx.lineWidth = 3;
                ctx.stroke();
                ctx.font = "18px monospace";
                ctx.fillStyle = `rgba(255, 220, 100, ${ef.life/4})`;
                ctx.fillText(ef.icon || "💥", ef.toX-10, ef.toY-10);
                ef.life--;
            }
            effects = effects.filter(e => e.life > 0);
        }

        function drawGameOverScreen(){
            ctx.globalAlpha = 0.75;
            ctx.fillStyle = "#041a1c";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.globalAlpha = 1;
            ctx.font = "34px monospace";
            ctx.fillStyle = "#ffbf87";
            ctx.fillText("💀 DEFEAT 💀", canvas.width/2-130, canvas.height/2-30);
            ctx.font = "16px monospace";
            ctx.fillStyle = "#d9e0a3";
            ctx.fillText("Press RESTART and START WAVE", canvas.width/2-150, canvas.height/2+30);
        }

        function drawVictoryScreen(){
            ctx.globalAlpha = 0.8;
            ctx.fillStyle = "#145a2c";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.globalAlpha = 1;
            ctx.font = "32px monospace";
            ctx.fillStyle = "#ffdd99";
            ctx.fillText("🏆 VICTORY! 🏆", canvas.width/2-130, canvas.height/2-30);
            ctx.font = "16px monospace";
            ctx.fillStyle = "#f9e7b3";
            ctx.fillText("You survived the boss & all 15 waves!", canvas.width/2-190, canvas.height/2+30);
            ctx.fillText("Thanks for playing!", canvas.width/2-100, canvas.height/2+70);
        }

        function draw(){
            drawGridAndPath();
            for(let e of enemies) e.draw(ctx);
            drawEffects();
            if(gameOverFlag) drawGameOverScreen();
            if(gameWinFlag) drawVictoryScreen();
            ctx.font = "bold 12px monospace";
            ctx.fillStyle = "#fcf3cf";
            ctx.fillText(`Selected: ${TOWER_TYPES[selectedTowerType].name}`, 15, 48);
        }

        function gameUpdate(){
            if(gameOverFlag || gameWinFlag) return;
            for(let e of enemies) e.update();
            checkEnemiesReachedEnd();
            updateTowers();
            updateWaveSpawning();
            if(lives <= 0) gameOver();
        }

        function gameLoop(){
            gameUpdate();
            draw();
            animationId = requestAnimationFrame(gameLoop);
        }

        // Event listeners
        canvas.addEventListener('click', (e) => {
            if(gameOverFlag || gameWinFlag) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            let mouseX = (e.clientX - rect.left) * scaleX;
            let mouseY = (e.clientY - rect.top) * scaleY;
            let col = Math.floor(mouseX / CELL_W);
            let row = Math.floor(mouseY / CELL_H);
            if(col>=0 && col<GRID_W && row>=0 && row<GRID_H) addTower(col, row);
        });

        // Tower selector UI
        const towerListDiv = document.getElementById('towerList');
        function buildTowerSelector(){
            towerListDiv.innerHTML = '';
            TOWER_TYPES.forEach((tower, idx) => {
                const div = document.createElement('div');
                div.className = `tower-option ${idx === selectedTowerType ? 'selected' : ''}`;
                div.innerHTML = `<div class="tower-icon">${tower.icon}</div><div class="tower-stats"><div><strong>${tower.name}</strong></div><div>⚔️ ${tower.damage} | 🎯 ${tower.range}</div><div class="price">💰 ${tower.price}</div><div style="font-size:9px;">${tower.desc}</div></div>`;
                div.addEventListener('click', () => {
                    selectedTowerType = idx;
                    document.querySelectorAll('.tower-option').forEach(el => el.classList.remove('selected'));
                    div.classList.add('selected');
                    showMessage(`Selected: ${tower.name}`, 600);
                });
                towerListDiv.appendChild(div);
            });
        }
        buildTowerSelector();

        startWaveBtn.addEventListener('click', startWave);
        resetBtn.addEventListener('click', () => {
            if(animationId) cancelAnimationFrame(animationId);
            resetGame();
            animationId = requestAnimationFrame(gameLoop);
        });

        resetGame();
        animationId = requestAnimationFrame(gameLoop);
    })();
</script>
